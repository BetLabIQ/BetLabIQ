  <style>
    :root {
      --bg: #050b18;
      --dark: #020617;
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --cyan: #06b6d4;
      --sky: #60a5fa;
      --green: #63f5b8;
      --gradient: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      --gold-gradient: linear-gradient(135deg, #3b82f6 0%, #06b6d4 45%, #63f5b8 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 20%, rgba(6, 182, 212, 0.13), transparent 36%),
        radial-gradient(circle at 85% 45%, rgba(59, 130, 246, 0.10), transparent 32%),
        linear-gradient(180deg, #050b18 0%, #020617 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-shell {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(96, 165, 250, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96, 165, 250, 0.045) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    .navbar {
      width: 100%;
      height: 96px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 6%;
      border-bottom: 1px solid rgba(6, 182, 212, 0.34);
      background:
        radial-gradient(circle at left, rgba(6, 182, 212, 0.16), transparent 34%),
        linear-gradient(90deg, rgba(5, 11, 24, 0.99), rgba(8, 18, 32, 0.96));
      backdrop-filter: blur(22px);
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.42), 0 0 42px rgba(6, 182, 212, 0.12);
    }

    .brand {
      justify-self: start;
      font-size: 2rem;
      font-weight: 950;
      letter-spacing: -0.075em;
      text-shadow: 0 0 22px rgba(96, 165, 250, 0.22);
    }

    .brand span {
      color: var(--sky);
    }

    .nav-links {
      justify-self: center;
      display: flex;
      align-items: center;
      gap: 42px;
      color: #dbeafe;
      font-weight: 950;
      font-size: 1.05rem;
    }

    .nav-links a {
      opacity: 0.9;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      opacity: 1;
      color: var(--cyan);
      transform: translateY(-1px);
    }

    .nav-cta {
      justify-self: end;
      padding: 16px 30px;
      border-radius: 18px;
      border: 1px solid rgba(6, 182, 212, 0.56);
      color: #67e8f9;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.16), rgba(59, 130, 246, 0.12));
      box-shadow: 0 0 38px rgba(6, 182, 212, 0.2), inset 0 0 18px rgba(96, 165, 250, 0.06);
      font-weight: 950;
      white-space: nowrap;
      transition: 0.2s ease;
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      background: var(--gradient);
      color: #ffffff;
    }

    .hero {
      min-height: 68vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 62px 4% 46px;
    }

    .hero-content {
      width: min(1320px, 100%);
      margin: 0 auto;
    }

    .eyebrow {
      display: inline-flex;
      color: #22d3ee;
      background: rgba(15, 23, 42, 0.76);
      border: 1px solid rgba(96, 165, 250, 0.26);
      border-radius: 999px;
      padding: 10px 24px;
      font-weight: 950;
      letter-spacing: 0.13em;
      font-size: 0.82rem;
      margin-bottom: 26px;
      box-shadow: 0 0 36px rgba(6, 182, 212, 0.12);
    }

    .hero h1 {
      font-size: clamp(4rem, 8.4vw, 7.1rem);
      line-height: 1.02;
      letter-spacing: -0.09em;
      font-weight: 950;
      overflow: visible;
      padding-bottom: 8px;
    }

    .hero h1 .white {
      display: block;
      color: var(--text);
    }

    .hero h1 .gradient-text {
      display: block;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
      padding-bottom: 14px;
    }

    .hero-subtitle {
      max-width: 900px;
      margin: 26px auto 0;
      color: #b6c2d4;
      font-size: clamp(1.1rem, 1.7vw, 1.36rem);
      line-height: 1.75;
      font-weight: 500;
    }

    .hero-actions {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 230px;
      padding: 17px 26px;
      border-radius: 16px;
      font-weight: 950;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--gradient);
      color: white;
      box-shadow: 0 18px 52px rgba(6, 182, 212, 0.24);
    }

    .btn-secondary {
      border: 1px solid rgba(96, 165, 250, 0.34);
      background: rgba(15, 23, 42, 0.62);
      color: #e2e8f0;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .sports-strip {
      margin-top: 30px;
      color: #64748b;
      font-weight: 900;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .features {
      padding: 34px 5% 88px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
      max-width: 1700px;
      margin: 0 auto;
    }

    .feature-card {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.68), rgba(5, 11, 24, 0.80));
      border: 1px solid rgba(96, 165, 250, 0.24);
      border-radius: 28px;
      padding: 40px 34px;
      min-height: 215px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.30), 0 0 38px rgba(6, 182, 212, 0.08);
      transition: 0.22s ease;
    }

    .feature-card:hover {
      transform: translateY(-7px);
      border-color: rgba(6, 182, 212, 0.48);
      box-shadow: 0 34px 110px rgba(0, 0, 0, 0.38), 0 0 48px rgba(6, 182, 212, 0.14);
    }

    .feature-card h3 {
      color: #38bdf8;
      font-size: 1.28rem;
      letter-spacing: 0.09em;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .feature-card p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.12rem;
    }

    .section-tag {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(6, 182, 212, 0.12);
      border: 1px solid rgba(6, 182, 212, 0.3);
      color: #38bdf8;
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .process-section {
      padding: 0 7% 90px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .process-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .process-header h2 {
      font-size: clamp(2.4rem, 5vw, 4rem);
      margin-bottom: 16px;
      letter-spacing: -0.06em;
    }

    .process-header p {
      color: var(--muted);
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.7;
      font-size: 1.12rem;
    }

    .process-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .process-item {
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(96, 165, 250, 0.18);
      border-radius: 18px;
      padding: 22px;
      text-align: center;
      font-weight: 800;
      color: #e2e8f0;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
    }
